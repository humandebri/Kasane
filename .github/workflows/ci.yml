name: CI

on:
  pull_request:
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Rust checks and tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tools/rpc-gateway/package-lock.json

      - name: Run GitHub-equivalent CI script
        env:
          EVM_CANISTER_ID: aaaaa-aa
          CANBENCH_MAX_REGRESSION_PCT: "2.0"
          CANBENCH_TARGET_IMPROVEMENT_PCT: "5.0"
        run: scripts/ci_github_equivalent.sh
