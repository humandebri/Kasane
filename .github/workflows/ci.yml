name: CI

on:
  pull_request:
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Rust checks and tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      VERUS_VERSION: "0.2026.05.05.d03e906"
      VERUS_TAG: "release/0.2026.05.05.d03e906"
      VERUS_LINUX_X86_SHA256: "09c0ef9f59995a9c0e26c2a47ef6a6fc437d67816aca1685d05b872519af426c"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Verus
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq unzip
          release_json="$(mktemp)"
          curl -fsSL "https://api.github.com/repos/verus-lang/verus/releases/tags/${VERUS_TAG}" -o "${release_json}"
          asset_url="$(jq -r '.assets[].browser_download_url | select(test("x86-linux.*\\.zip$"))' "${release_json}" | head -n 1)"
          asset_digest="$(jq -r '.assets[] | select(.name | test("x86-linux.*\\.zip$")) | .digest // ""' "${release_json}" | head -n 1)"
          if [[ -z "${asset_url}" ]]; then
            echo "Verus x86-linux release asset not found for ${VERUS_TAG}" >&2
            exit 1
          fi
          if [[ "${asset_digest}" != "sha256:${VERUS_LINUX_X86_SHA256}" ]]; then
            echo "Verus asset digest mismatch for ${VERUS_TAG}: ${asset_digest}" >&2
            exit 1
          fi
          curl -fsSL "${asset_url}" -o /tmp/verus.zip
          echo "${VERUS_LINUX_X86_SHA256}  /tmp/verus.zip" | sha256sum -c -
          unzip -q /tmp/verus.zip -d /tmp/verus-release
          verus_bin="$(find /tmp/verus-release -type f -name verus -perm -111 | head -n 1)"
          if [[ -z "${verus_bin}" ]]; then
            echo "Verus binary not found in release asset" >&2
            exit 1
          fi
          rustup install 1.95.0-x86_64-unknown-linux-gnu
          echo "VERUS_BIN=${verus_bin}" >> "${GITHUB_ENV}"

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tools/rpc-gateway/package-lock.json

      - name: Run GitHub-equivalent CI script
        env:
          EVM_CANISTER_ID: aaaaa-aa
          CANBENCH_MAX_REGRESSION_PCT: "2.0"
          CANBENCH_TARGET_IMPROVEMENT_PCT: "5.0"
        run: scripts/ci_github_equivalent.sh
