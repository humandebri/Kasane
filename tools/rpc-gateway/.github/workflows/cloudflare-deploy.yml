# This workflow is committed under tools/rpc-gateway so subtree mirror publishes it
# as .github/workflows/cloudflare-deploy.yml in kasane-network/rpc-gateway.
# Keep npm commands at repo root here; package files live at root after mirroring.
name: Cloudflare Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_production:
        description: "Deploy production route after staging read-only smoke"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions: read-all

concurrency:
  group: rpc-gateway-cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy RPC Gateway Worker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      RPC_GATEWAY_IDENTITY_PEM: ${{ secrets.RPC_GATEWAY_IDENTITY_PEM }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Validate secrets
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN}"
          test -n "${CLOUDFLARE_ACCOUNT_ID}"
          test -n "${RPC_GATEWAY_IDENTITY_PEM}"

      - name: Install
        run: npm ci

      - name: Test
        run: |
          set -euo pipefail
          npm test
          npm run lint
          npm run build
          npm run typecheck:worker

      - name: Write ephemeral secrets file
        run: |
          set -euo pipefail
          node -e 'require("node:fs").writeFileSync(".cloudflare-secrets.json", JSON.stringify({ RPC_GATEWAY_IDENTITY_PEM: process.env.RPC_GATEWAY_IDENTITY_PEM }))'

      - name: Deploy staging
        run: npx wrangler deploy --env staging --secrets-file .cloudflare-secrets.json

      - name: Smoke staging read-only
        env:
          EVM_RPC_URL: https://rpc-staging.kasane.network
        run: npm run smoke:read

      - name: Deploy production
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_production == 'true' }}
        run: npx wrangler deploy --env production --secrets-file .cloudflare-secrets.json

      - name: Smoke production read-only
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_production == 'true' }}
        env:
          EVM_RPC_URL: https://rpc.kasane.network
        run: npm run smoke:read
